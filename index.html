<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOM ACADEMY | Login</title>

<link rel="stylesheet" href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="login-container">


<div class="login-box">


<div class="logo">

<i class="fa-solid fa-school"></i>

<h2>SOM ACADEMY</h2>

<p>School Management System</p>

</div>



<form id="loginForm">



<div class="input-box">

<i class="fa fa-envelope"></i>

<input 
type="email"
id="email"
placeholder="Email"
required>

</div>




<div class="input-box">

<i class="fa fa-lock"></i>


<input 
type="password"
id="password"
placeholder="Password"
required>


<i class="fa fa-eye"
id="eye"></i>


</div>





<div class="role-box">


<select id="role" required>

<option value="">
Select Role
</option>

<option value="Admin">
Admin
</option>

<option value="Teacher">
Teacher
</option>

<option value="Student">
Student
</option>

<option value="Parent">
Parent
</option>


</select>


</div>





<div class="remember">


<label>

<input type="checkbox" id="remember">

Remember Me

</label>


<a href="#">
Forgot Password?
</a>


</div>





<button type="submit">


<i class="fa fa-right-to-bracket"></i>

Login


</button>



<p id="message"></p>



</form>


</div>


</div>



<script src="js/login.js"></script>


</body>

</html>
