<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOM ACADEMY | My Attendance</title>

<link rel="stylesheet" href="css/attendance.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<h2>SOM ACADEMY</h2>

<p>Student Portal</p>

</div>

<ul>

<li>

<a href="dashboard.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>

</li>

<li>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

Profile

</a>

</li>

<li class="active">

<a href="#">

<i class="fa-solid fa-calendar-check"></i>

Attendance

</a>

</li>

<li>

<a href="results.html">

<i class="fa-solid fa-graduation-cap"></i>

Results

</a>

</li>

<li>

<a href="fees.html">

<i class="fa-solid fa-money-bill-wave"></i>

Fees

</a>

</li>

<li>

<a href="#" onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</div>

<!-- Main -->

<div class="main">

<div class="navbar">

<h2>My Attendance</h2>

<p id="clock"></p>

</div>

<!-- Statistics -->

<div class="stats">

<div class="card">

<i class="fa-solid fa-user-check"></i>

<h3>Present</h3>

<h1 id="presentCount">0</h1>

</div>

<div class="card">

<i class="fa-solid fa-user-xmark"></i>

<h3>Absent</h3>

<h1 id="absentCount">0</h1>

</div>

<div class="card">

<i class="fa-solid fa-clock"></i>

<h3>Late</h3>

<h1 id="lateCount">0</h1>

</div>

<div class="card">

<i class="fa-solid fa-percent"></i>

<h3>Attendance %</h3>

<h1 id="attendancePercent">0%</h1>

</div>

</div>

<!-- Search -->

<div class="search-box">

<input
type="text"
id="searchAttendance"
placeholder="Search by Date or Status...">

</div>

<!-- Attendance Table -->

<div class="table-box">

<div class="table-header">

<h2>Attendance History</h2>

<button onclick="window.print()">

<i class="fa-solid fa-print"></i>

Print

</button>

</div>

<table>

<thead>

<tr>

<th>Date</th>

<th>Student</th>

<th>Class</th>

<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</div>

<footer>

<p>

© 2026 SOM ACADEMY Student Portal

</p>

</footer>

</div>

<script src="js/attendance.js"></script>

</body>
</html>
