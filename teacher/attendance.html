<link rel="stylesheet" href="css/attendance.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>



<div class="sidebar">


<div class="brand">

<h2>SOM ACADEMY</h2>

<p>Teacher Panel</p>

</div>



<ul>


<li>

<a href="dashboard.html">

<i class="fa fa-home"></i>

Dashboard

</a>

</li>



<li>

<a href="profile.html">

<i class="fa fa-user"></i>

Profile

</a>

</li>



<li>

<a href="students.html">

<i class="fa fa-users"></i>

Students

</a>

</li>




<li class="active">

<a href="#">

<i class="fa fa-calendar-check"></i>

Attendance

</a>

</li>




<li>

<a href="exams.html">

<i class="fa fa-file"></i>

Exams

</a>

</li>




<li>

<a href="#" onclick="logout()">

<i class="fa fa-right-from-bracket"></i>

Logout

</a>

</li>


</ul>


</div>








<div class="main">



<div class="header">


<h2>Attendance Management</h2>


<p id="clock"></p>


</div>








<div class="form-box">


<h2>

Take Attendance

</h2>




<div class="grid">



<input 
type="date"
id="attendanceDate">





<select id="studentSelect">


<option value="">

Select Student

</option>


</select>





<select id="attendanceStatus">


<option>

Present

</option>


<option>

Absent

</option>


<option>

Late

</option>


</select>






<button onclick="saveAttendance()">

<i class="fa fa-save"></i>

Save

</button>




</div>


</div>









<div class="table-box">


<h2>

Attendance List

</h2>



<table>


<thead>

<tr>


<th>Date</th>

<th>Student</th>

<th>Class</th>

<th>Status</th>


</tr>


</thead>



<tbody id="attendanceTable">


</tbody>



</table>



</div>







<footer>

© 2026 SOM ACADEMY Teacher Portal

</footer>



</div>






<script src="js/attendance.js"></script>


</body>

</html>
