<link rel="stylesheet" href="css/exams.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>



<div class="sidebar">


<div class="brand">

<h2>SOM ACADEMY</h2>

<p>Teacher Panel</p>

</div>



<ul>


<li>

<a href="dashboard.html">

<i class="fa fa-home"></i>

Dashboard

</a>

</li>



<li>

<a href="students.html">

<i class="fa fa-users"></i>

Students

</a>

</li>



<li>

<a href="attendance.html">

<i class="fa fa-calendar-check"></i>

Attendance

</a>

</li>




<li class="active">

<a href="#">

<i class="fa fa-file-lines"></i>

Exams

</a>

</li>




<li>

<a href="profile.html">

<i class="fa fa-user"></i>

Profile

</a>

</li>




<li>

<a href="#" onclick="logout()">

<i class="fa fa-right-from-bracket"></i>

Logout

</a>

</li>


</ul>


</div>










<div class="main">



<div class="header">


<h2>Exams Management</h2>


<p id="clock"></p>


</div>







<div class="form-box">


<h2>Add Result</h2>




<div class="grid">



<select id="studentSelect">


<option value="">

Select Student

</option>


</select>





<input 
type="text"
id="subject"
placeholder="Subject">





<input 
type="number"
id="marks"
placeholder="Marks">






<button onclick="addResult()">

<i class="fa fa-save"></i>

Save Result

</button>



</div>



</div>








<div class="table-box">


<h2>Results List</h2>



<table>


<thead>


<tr>


<th>Student</th>

<th>Subject</th>

<th>Marks</th>

<th>Grade</th>


</tr>


</thead>



<tbody id="resultTable">


</tbody>



</table>



</div>








<footer>

© 2026 SOM ACADEMY Teacher Portal

</footer>





</div>






<script src="js/exams.js"></script>


</body>

</html>
