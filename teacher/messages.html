<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>



<div class="sidebar">


<div class="brand">

<h2>SOM ACADEMY</h2>

<p>Teacher Panel</p>

</div>



<ul>


<li>

<a href="dashboard.html">

<i class="fa fa-home"></i>

Dashboard

</a>

</li>




<li>

<a href="profile.html">

<i class="fa fa-user"></i>

Profile

</a>

</li>




<li>

<a href="students.html">

<i class="fa fa-users"></i>

Students

</a>

</li>




<li>

<a href="attendance.html">

<i class="fa fa-calendar-check"></i>

Attendance

</a>

</li>




<li>

<a href="exams.html">

<i class="fa fa-file"></i>

Exams

</a>

</li>




<li>

<a href="schedule.html">

<i class="fa fa-calendar"></i>

Schedule

</a>

</li>




<li class="active">

<a href="#">

<i class="fa fa-envelope"></i>

Messages

</a>

</li>




<li>

<a href="#" onclick="logout()">

<i class="fa fa-right-from-bracket"></i>

Logout

</a>

</li>



</ul>


</div>









<div class="main">



<div class="header">


<h2>Messages</h2>


<p id="clock"></p>


</div>








<div class="message-box">


<h2>Send Message</h2>



<textarea 
id="messageText"
placeholder="Write message...">
</textarea>



<button onclick="sendMessage()">

<i class="fa fa-paper-plane"></i>

Send

</button>



</div>








<div class="table-box">


<h2>Message List</h2>



<table>


<thead>


<tr>

<th>Date</th>

<th>Message</th>

<th>Action</th>

</tr>


</thead>




<tbody id="messageTable">


</tbody>



</table>



</div>






<footer>

© 2026 SOM ACADEMY Teacher Portal

</footer>



</div>





<script src="js/messages.js"></script>


</body>

</html>
