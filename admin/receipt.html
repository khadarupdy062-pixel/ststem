<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOM ACADEMY | Receipt</title>


<link rel="stylesheet" href="css/receipt.css">


</head>


<body>
    
    <!-- Back Button -->

<div class="back-btn">

<a href="fees.html">

<i class="fa-solid fa-arrow-left"></i>

Back to Fees

</a>

</div>


<div class="receipt">


<div class="school">

<h1>
SOM ACADEMY
</h1>

<p>
Student Fee Receipt
</p>

</div>




<hr>




<div class="details">


<p>
<strong>Student:</strong>
<span id="studentName"></span>
</p>


<p>
<strong>Class:</strong>
<span id="studentClass"></span>
</p>



<p>
<strong>Amount:</strong>
$ <span id="amount"></span>
</p>



<p>
<strong>Payment Method:</strong>
<span id="method"></span>
</p>




<p>
<strong>Status:</strong>
<span id="status"></span>
</p>



<p>
<strong>Payment Date:</strong>
<span id="date"></span>
</p>



<p>
<strong>Receipt No:</strong>
<span id="receipt"></span>
</p>



</div>




<hr>



<div class="footer">


<p>
Thank You For Your Payment
</p>


<button onclick="window.print()">

🖨 Print Receipt

</button>


</div>



</div>




<script src="js/receipt.js"></script>


</body>

</html>
